[[plugins]]
repo = 'folke/flash.nvim'
lua_add = '''
local flash = require('flash')
vim.keymap.set('n', 's', function() flash.jump() end)
'''

[[plugins]]
repo = 'EdenEast/nightfox.nvim'

[[plugins]]
repo = 'scottmckendry/cyberdream.nvim'
lua_add = '''
require('cyberdream').setup({
  transparent = true
})
vim.cmd [[ colorscheme cyberdream ]]
'''

[[plugins]]
repo = 'nvim-treesitter/nvim-treesitter'
lua_add = '''
local ts_configs = require('nvim-treesitter.configs')
ts_configs.setup({
	highlight = {
		enable = true,
	},
})
'''

[[plugins]]
repo = 'neovim/nvim-lspconfig'
lua_add = '''
vim.lsp.enable('intelephense')
vim.lsp.enable('gopls')
vim.lsp.enable('rust_analyzer')
vim.lsp.enable('ts_ls')
'''

[[plugins]]
repo = 'numToStr/Comment.nvim'
lua_add = '''
require('Comment').setup()
'''

[[plugins]]
repo = 'lewis6991/gitsigns.nvim'
lua_add = '''
require('gitsigns').setup()
'''

[[plugins]]
repo = 'matsui54/denops-popup-preview.vim'
hook_add = '''
call popup_preview#enable()
'''

# TODO: matsui54/denops-signature_help

[[plugins]]
repo = 'Shougo/ddc.vim'
lua_add = '''
vim.lsp.config('*', {
  capabilities = require("ddc_source_lsp").make_client_capabilities(),
})
'''
hook_add = '''
call ddc#custom#patch_global('ui', 'native')
call ddc#custom#patch_global('sources', ['lsp', 'around'])
call ddc#custom#patch_global('sourceOptions', #{
	\ _: #{
	\	matchers: ['matcher_head'],
	\		sorters: ['sorter_rank'],
	\	},
	\ 	around: #{
	\		mark: '[A]',
	\ },
	\ lsp: #{
	\	mark: '[L]',
	\	isVolatile: v:true,
	\	forceCompletionPattern: '\.\w*|:\w*|->\w*',
	\ }})
call ddc#custom#patch_global('sourceParams', #{
	\ 	lsp: #{
	\		enableResolveItem: v:true,
	\		enableAdditionalTextEdit: v:true,
	\	},
	\ })
call ddc#custom#patch_global('autoCompleteDelay', 100)
call ddc#enable()
'''

[[plugins]]
repo = 'Shougo/ddc-ui-native'

[[plugins]]
repo = 'Shougo/ddc-source-around'

[[plugins]]
repo = 'Shougo/ddc-filter-matcher_head'

[[plugins]]
repo = 'Shougo/ddc-filter-sorter_rank'

[[plugins]]
repo = 'Shougo/ddc-source-lsp'

[[plugins]]
repo = 'Shougo/ddc-converter_remove_overlap'

[[plugins]]
repo = 'Shougo/ddu.vim'
hook_add = '''
call ddu#custom#patch_global(#{
  \ kindOptions: #{
  \   file: #{
  \     defaultAction: 'open',
  \   },
  \   lsp: #{
  \     defaultAction: 'open',
  \   },
  \   lsp_codeAction: #{
  \     defaultAction: 'apply,'
  \   },
  \ }})

call ddu#custom#patch_local('filer', #{
  \ sync: v:true,
  \ ui: 'filer',
  \ uiParams: #{
  \   filer: #{
  \     split: 'floating',
  \     sort: 'filename',
  \     sortTreesFirst: v:true,
  \   },
  \ },
  \ sources: [#{ name: 'file' }],
  \ sourceOptions: #{
  \   _: #{
  \     columns: ['icon_filename'],
  \     matchers: ['matcher_fzf'],
  \   },
  \ }})
autocmd FileType ddu-filer call s:ddu_filer_setting()
function! s:ddu_filer_setting() abort
	nnoremap <buffer><silent> <CR>
		\ <Cmd>call ddu#ui#do_action('itemAction', #{ name: 'open' })<CR>
	nnoremap <buffer><silent> <Space>
		\ <Cmd>call ddu#ui#do_action('toggleSelectItem')<CR>
	nnoremap <buffer><silent> o
		\ <Cmd>call ddu#ui#do_action('expandItem', #{ mode: 'toggle' })<CR>
  nnoremap <buffer><silent> c
    \ <Cmd>call ddu#ui#do_action('itemAction', #{ name: 'newFile' })<CR>
  nnoremap <buffer><silent> d
    \ <Cmd>call ddu#ui#do_action('itemAction', #{ name: 'trash' })<CR>
  nnoremap <buffer><silent> r
    \ <Cmd>call ddu#ui#do_action('itemAction', #{ name: 'rename' })<CR>
  nnoremap <buffer><silent> u
    \ <Cmd>call ddu#ui#do_action('itemAction', #{ name: 'undo' })<CR>
  nnoremap <buffer><silent> i
    \ <Cmd>call ddu#ui#do_action('openFilterWindow')<CR>
	nnoremap <buffer><silent> q
		\ <Cmd>call ddu#ui#do_action('quit')<CR>
endfunction
nnoremap <leader>fe <Cmd>call ddu#start(#{ name: 'filer' })<CR>

call ddu#custom#patch_local('fuzzyfinder', #{
  \ ui: 'ff',
  \ uiParams: #{
  \   ff: #{
  \     split: 'floating',
  \   },
  \ },
  \ sources: [#{ name: 'file_rec' }],
  \ sourceOptions: #{
  \   _: #{
  \     columns: ['icon_filename'],
  \     matchers: ['matcher_fzf'],
  \   }
  \ }})
autocmd FileType ddu-ff call s:ddu_fuzzyfinder_setting()
function! s:ddu_fuzzyfinder_setting() abort
	nnoremap <buffer><silent> <CR>
		\ <Cmd>call ddu#ui#do_action('itemAction', #{ name: 'open' })<CR>
	nnoremap <buffer><silent> i
		\ <Cmd>call ddu#ui#do_action('openFilterWindow')<CR>
	nnoremap <buffer><silent> q
		\ <Cmd>call ddu#ui#do_action('quit')<CR>
endfunction
nnoremap <leader>ff <Cmd>call ddu#start(#{ name: 'fuzzyfinder' })<CR>

call ddu#custom#patch_local('lsp-definition_definition', #{
  \ sync: v:true,
  \ ui: 'ff',
  \ sources: [#{ name: 'lsp_definition', params: #{ method: 'textDocument/definition' } }],
  \ uiParams: #{
  \   ff: #{
  \     immediateAction: 'open',
  \   }
  \ }})
nnoremap <leader>gd <Cmd>call ddu#start(#{ name: 'lsp-definition_definition' })<CR>

call ddu#custom#patch_local('lsp-definition_typeDefinition', #{
  \ sync: v:true,
  \ ui: 'ff',
  \ sources: [#{ name: 'lsp_definition', params: #{ method: 'textDocument/typeDefinition' } }],
  \ uiParams: #{
  \   ff: #{
  \     immediateAction: 'open',
  \   }
  \ }})
nnoremap <leader>gD <Cmd>call ddu#start(#{ name: 'lsp-definition_typeDefinition' })<CR>

call ddu#custom#patch_local('lsp-definition_implementation', #{
  \ sync: v:true,
  \ ui: 'ff',
  \ sources: [#{ name: 'lsp_definition', params: #{ method: 'textDocument/implementation' } }],
  \ uiParams: #{
  \   ff: #{
  \     immediateAction: 'open',
  \   }
  \ }})
nnoremap <leader>gi <Cmd>call ddu#start(#{ name: 'lsp-definition_implementation' })<CR>

call ddu#custom#patch_local('lsp-references', #{
  \ sync: v:true,
  \ ui: 'ff',
  \ sources: [#{ name: 'lsp_references' }],
  \ uiParams: #{
  \   ff: #{
  \     immediateAction: 'open',
  \   },
  \ }})
nnoremap <leader>gR <Cmd>call ddu#start(#{ name: 'lsp-references' })<CR>

call ddu#custom#patch_local('lsp-codeAction', #{
  \ sync: v:true,
  \ ui: 'ff',
  \ sources: [#{ name: 'lsp_codeAction' }],
  \ uiParams: #{
  \   ff: #{
  \     immediateAction: 'open',
  \   },
  \ }})
nnoremap <leader>ca <Cmd>call ddu#start(#{ name: 'lsp-codeAction' })<CR>

call ddu#custom#patch_local('buffer', #{
  \ sync: v:true,
  \ ui: 'ff',
  \ sources: [#{ name: 'buffer' }],
  \ sourceParams: #{
  \   file_rec: #{
  \     ignoreDirectories: ['.git', 'node_modules'],
  \   },
  \ }})

nnoremap <leader>fb <Cmd>call ddu#start(#{ name: 'buffer' })<CR>
'''

