[[plugins]]
repo = 'folke/flash.nvim'
lua_add = '''
local flash = require('flash')
vim.keymap.set('n', 's', function() flash.jump() end)
'''

[[plugins]]
repo = 'rktjmp/lush.nvim'

[[plugins]]
repo = 'zenbones-theme/zenbones.nvim'
hook_add = '''
colorscheme zenbones
'''

[[plugins]]
repo = 'nvim-treesitter/nvim-treesitter'
lua_add = '''
local ts_configs = require('nvim-treesitter.configs')
ts_configs.setup({
	highlight = {
		enable = true,
	},
})
'''

[[plugins]]
repo = 'neovim/nvim-lspconfig'
lua_add = '''
vim.lsp.enable('intelephense')
vim.lsp.enable('gopls')
vim.lsp.enable('rust_analyzer')
'''

[[plugins]]
repo = 'lewis6991/gitsigns.nvim'
lua_add = '''
require('gitsigns').setup()
'''

[[plugins]]
repo = 'Shougo/ddc.vim'
lua_add = '''
vim.lsp.config('*', {
  capabilities = require("ddc_source_lsp").make_client_capabilities(),
})
'''
hook_add = '''
call ddc#custom#patch_global('ui', 'native')
call ddc#custom#patch_global('sources', ['lsp', 'around'])
call ddc#custom#patch_global('sourceOptions', #{
	\	_: #{
	\		matchers: ['matcher_head'],
	\		sorters: ['sorter_rank'],
	\	},
	\ 	around: #{
	\		mark: '[A]',
	\	},
	\	lsp: #{
	\		mark: '[L]',
	\		isVolatile: v:true,
	\		forceCompletionPattern: '\.\w*|:\w*|->\w*',
	\	}})
call ddc#custom#patch_global('sourceParams', #{
	\ 	lsp: #{
	\		enableResolveItem: v:true,
	\		enableAdditionalTextEdit: v:true,
	\	},
	\ })
call ddc#enable()
'''

[[plugins]]
repo = 'Shougo/ddc-ui-native'

[[plugins]]
repo = 'Shougo/ddc-source-around'

[[plugins]]
repo = 'Shougo/ddc-filter-matcher_head'

[[plugins]]
repo = 'Shougo/ddc-filter-sorter_rank'

[[plugins]]
repo = 'Shougo/ddc-source-lsp'

[[plugins]]
repo = 'Shougo/ddc-converter_remove_overlap'

[[plugins]]
repo = 'nvim-lua/plenary.nvim'

[[plugins]]
repo = 'nvimtools/none-ls.nvim'
lua_add = '''
local null_ls = require("null-ls")

null_ls.setup({
    sources = {
    	null_ls.builtins.diagnostics.phpstan.with({
		command = "dev-script/phpstan",
		extra_args = { "--configuration", "phpstan.neon.dist" },
	}),
    },
})
'''
