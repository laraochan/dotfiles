[[plugins]]
repo = 'catppuccin/vim'
hook_add = '''
colorscheme catppuccin_mocha
'''

[[plugins]]
repo = 'prabirshrestha/vim-lsp'
hook_add = '''
function! s:on_lsp_buffer_enabled() abort
    setlocal omnifunc=lsp#complete
    setlocal signcolumn=yes
    if exists('+tagfunc') | setlocal tagfunc=lsp#tagfunc | endif
    nmap <buffer> gd <plug>(lsp-definition)
    nmap <buffer> gs <plug>(lsp-document-symbol-search)
    nmap <buffer> gS <plug>(lsp-workspace-symbol-search)
    nmap <buffer> gr <plug>(lsp-references)
    nmap <buffer> gi <plug>(lsp-implementation)
    nmap <buffer> gt <plug>(lsp-type-definition)
    nmap <buffer> <leader>rn <plug>(lsp-rename)
    nmap <buffer> [g <plug>(lsp-previous-diagnostic)
    nmap <buffer> ]g <plug>(lsp-next-diagnostic)
    nmap <buffer> K <plug>(lsp-hover)
    nnoremap <buffer> <expr><c-f> lsp#scroll(+4)
    nnoremap <buffer> <expr><c-b> lsp#scroll(-4)

    let g:lsp_format_sync_timeout = 1000
    autocmd! BufWritePre *.rs,*.go call execute('LspDocumentFormatSync')
endfunction

augroup lsp_install
    au!
    " call s:on_lsp_buffer_enabled only for languages that has the server registered.
    autocmd User lsp_buffer_enabled call s:on_lsp_buffer_enabled()
augroup END
'''

[[plugins]]
repo = 'mattn/vim-lsp-settings'

[[plugins]]
repo = 'Shougo/ddc.vim'
hook_add = '''
call ddc#custom#patch_global('ui', 'native')
call ddc#custom#patch_global('sources', ['lsp', 'around'])
call ddc#custom#patch_global('sourceOptions', #{
	\ _: #{
	\     matchers: ['matcher_head'],
	\		  sorters: ['sorter_rank'],
	\	},
	\ around: #{
	\		  mark: '[A]',
	\ },
	\ lsp: #{
	\	    mark: '[L]',
	\	    isVolatile: v:true,
	\	    forceCompletionPattern: '\.\w*|:\w*|->\w*',
	\ }})
call ddc#custom#patch_global('sourceParams', #{
	\ lsp: #{
	\		  enableResolveItem: v:true,
	\		  enableAdditionalTextEdit: v:true,
  \     lspEngine: 'vim-lsp',
	\	}})
call ddc#custom#patch_global('autoCompleteDelay', 100)
call ddc#enable()
'''

[[plugins]]
repo = 'Shougo/ddc-ui-native'

[[plugins]]
repo = 'Shougo/ddc-source-around'

[[plugins]]
repo = 'Shougo/ddc-filter-matcher_head'

[[plugins]]
repo = 'Shougo/ddc-filter-sorter_rank'

[[plugins]]
repo = 'Shougo/ddc-source-lsp'

[[plugins]]
repo = 'Shougo/ddc-converter_remove_overlap'

[[plugins]]
repo = 'airblade/vim-gitgutter'
hook_add = '''
highlight GitGutterAdd    ctermfg=2 guifg=#00ff00
highlight GitGutterChange ctermfg=3 guifg=#ffff00  
highlight GitGutterDelete ctermfg=1 guifg=#ff0000
'''

[[plugins]]
repo = 'voldikss/vim-floaterm'
hook_add = '''
nnoremap <leader>ft <Cmd>FloatermToggle<CR>
'''

[[plugins]]
repo = 'charlespascoe/vim-go-syntax'

[[plugins]]
repo = 'arzg/vim-rust-syntax-ext'
