[[plugins]]
repo = 'Shougo/ddu.vim'
depends = [
  'ddu-ui-filer',
  'ddu-ui-ff',
  'ddu-kind-file',
  'ddu-source-file',
  'ddu-source-file_rec',
  'ddu-filter-matcher_hidden',
  'ddu-filter-matcher_substring',
  'ddu-column-icon_filename',
]
hook_add = '''
" ripgrepを使用した高速検索設定
call ddu#custom#patch_local('ddu-rg', 'ui', 'ff')
call ddu#custom#patch_local('ddu-rg', 'sources', [#{name: 'rg'}])
call ddu#custom#patch_local('ddu-rg', 'sourceOptions', #{
  \ rg: #{
  \   matchers: [],
  \   sorters: [],
  \ }})
call ddu#custom#patch_local('ddu-rg', 'sourceParams', #{
  \ rg: #{
  \   args: ['--json'],
  \ }})
call ddu#custom#patch_local('ddu-rg', 'kindOptions', #{
  \ file: #{
  \   defaultAction: 'open',
  \ }})

" file_recの最適化版（既存のmatcher_substringより高速な設定）
call ddu#custom#patch_local('ddu-ff-optimized', 'ui', 'ff')
call ddu#custom#patch_local('ddu-ff-optimized', 'sources', [#{name: 'file_rec'}])
call ddu#custom#patch_local('ddu-ff-optimized', 'sourceOptions', #{
  \ file_rec: #{
  \   matchers: ['matcher_substring'],
  \   converters: [],
  \   sorters: [],
  \ }})
call ddu#custom#patch_local('ddu-ff-optimized', 'sourceParams', #{
  \ file_rec: #{
  \   ignoredDirectories: ['node_modules', '.git', '.vscode', 'dist', 'build', 'target'],
  \   maxItems: 50000,
  \ }})
call ddu#custom#patch_local('ddu-ff-optimized', 'kindOptions', #{
  \ file: #{
  \   defaultAction: 'open',
  \ }})

" 共通のff設定
autocmd Filetype ddu-ff call s:ddu_ff_setting()
function! s:ddu_ff_setting() abort
  setlocal cursorline
  nnoremap <buffer><silent> <CR>
    \ <CMD>call ddu#ui#do_action('itemAction', #{name: 'open'})<CR>
  nnoremap <buffer><silent> q
    \ <CMD>call ddu#ui#do_action('quit')<CR>
  nnoremap <buffer><silent> i
    \ <CMD>call ddu#ui#do_action('openFilterWindow')<CR>
endfunction

" キーマッピング
nnoremap <leader>fe <CMD>call ddu#start(#{name: 'ddu-filer'})<CR>
nnoremap <leader>ff <CMD>call ddu#start(#{name: 'ddu-ff-optimized'})<CR>
nnoremap <leader>fg <CMD>call ddu#start(#{name: 'ddu-rg'})<CR>
'''

